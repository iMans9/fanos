<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ш§Щ„ЩҒШ§ЩҶЩҲШі</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --red: #ff4757; --navy: #0a3d62; --bg: #1e272e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        .glass-3d { background: linear-gradient(145deg, #2c3e50, #000000); border-radius: 30px; box-shadow: 10px 10px 30px #0c0c14, -10px -10px 30px #2a2a3a; border: 1px solid rgba(255,255,255,0.1); padding: 30px; text-align: center; width: 90%; max-width: 450px; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .screen.active { display: flex; animation: slideIn 0.5s ease; }

        /* ШӘШ§ЩӮ Ш§Щ„ЩҒШҰШ© */
        #category-tag { background: var(--gold); color: #000; padding: 5px 20px; border-radius: 20px; font-weight: 900; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 0.9rem; }

        #phrase-display { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 15px; perspective: 1000px; }
        .letter-box { width: 38px; height: 52px; background: #f1f2f6; color: transparent; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; transition: 0.6s; box-shadow: 0 5px 0 #bdc3c7; }
        .letter-box.revealed { color: #1a1a2e; background: var(--gold); transform: rotateX(360deg); box-shadow: 0 5px 0 #b8860b; }
        .letter-box.space { background: transparent; width: 15px; box-shadow: none; }

        .wheel-container { position: relative; width: 280px; height: 280px; margin: 10px 0; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #fff; box-shadow: 0 15px 30px rgba(0,0,0,0.7); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 35px; color: var(--red); z-index: 10; }

        #fancy-msg { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0); background: linear-gradient(45deg, var(--gold), #ff9f43); color: #000; padding: 15px 30px; border-radius: 50px; font-weight: 900; font-size: 1.5rem; z-index: 1000; box-shadow: 0 0 40px rgba(255, 215, 0, 0.5); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #fancy-msg.show { transform: translate(-50%, -50%) scale(1); }

        .btn-3d { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 #2c3e50; transition: 0.2s; font-family: inherit; margin: 4px; font-size: 0.85rem; }
        .btn-3d:active { transform: translateY(3px); box-shadow: 0 2px 0 #2c3e50; }
        .btn-spin { background: var(--red); color: white; box-shadow: 0 5px 0 #b33939; }
        .btn-solve { background: #2ecc71; color: white; box-shadow: 0 5px 0 #219150; }

        #players-info { display: flex; gap: 8px; margin-bottom: 15px; width: 100%; justify-content: center; }
        .p-card { padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 2px solid transparent; min-width: 90px; text-align: center; }
        .p-card.active { border-color: var(--gold); background: rgba(255,215,0,0.1); }
        .p-score { font-size: 1.3rem; font-weight: 900; color: var(--gold); }

        #kb-box, #solve-box { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); padding: 20px; border-radius: 30px 30px 0 0; transform: translateY(100%); transition: 0.4s; z-index: 500; border-top: 2px solid var(--gold); }
        #kb-box.open, #solve-box.open { transform: translateY(0); }
        .key { padding: 10px; margin: 3px; border-radius: 8px; border: none; background: #fff; font-weight: bold; cursor: pointer; min-width: 40px; font-size: 1.1rem; }
        .key.used { opacity: 0.2; }

        input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: none; margin: 10px 0; font-family: inherit; font-weight: bold; text-align: center; }
        .hidden { display: none !important; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="fancy-msg">рҹҸҶ ШұШіШ§Щ„Ш©</div>

    <div id="setup-screen" class="screen active">
        <div class="glass-3d">
            <h1 style="color:var(--gold); font-size: 3rem; margin:0;">ЩҒЩҖШ§ЩҶЩҖЩҲШі</h1>
            <select id="p-count">
                <option value="2">Щ„Ш§Ш№ШЁЩҠЩҶ (2)</option>
                <option value="3" selected>Ш«Щ„Ш§Ш«Ш© Щ„Ш§Ш№ШЁЩҠЩҶ (3)</option>
            </select>
            <div id="p-names"></div>
            <input type="number" id="target" value="5000">
            <button onclick="startGame()" class="btn-3d btn-spin" style="width:100%; font-size: 1.3rem;">Ш§ЩҶШ·Щ„ЩӮ рҹҡҖ</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="players-info"></div>
        <div id="category-tag">Ш§Щ„ЩҒШҰШ©: ---</div>
        <div id="phrase-display"></div>
        
        <div class="wheel-container">
            <div class="pointer">в–ј</div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>

        <div class="actions">
            <button id="spin-btn" class="btn-3d btn-spin">Щ„ЩҒ Ш§Щ„Ш№Ш¬Щ„Ш© рҹҺЎ</button>
            <button id="vowel-btn" class="btn-3d" style="background:#00cec9; color:#fff;" disabled>Щ…ШіШ§Ш№ШҜШ© (250) рҹ’Ў</button>
            <button id="solve-btn" class="btn-3d btn-solve">ШЈШ№ШұЩҒ Ш§Щ„ШӯЩ„! вң…</button>
        </div>

        <div id="kb-box">
            <div id="keys" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
            <button onclick="closePopups()" style="width:100%; background:var(--red); color:white; border:none; padding:12px; border-radius:10px; margin-top:10px; font-weight:bold;">ШҘШәЩ„Ш§ЩӮ</button>
        </div>

        <div id="solve-box">
            <h3 style="margin:0; color:var(--gold);">Ш§ЩғШӘШЁ Ш§Щ„Ш¬Щ…Щ„Ш© ЩғШ§Щ…Щ„Ш©:</h3>
            <input type="text" id="solve-input" placeholder="Ш§ЩғШӘШЁ Ш§Щ„ШӯЩ„ ЩҮЩҶШ§...">
            <div style="display:flex; gap:10px;">
                <button onclick="checkFinalSolve()" class="btn-3d btn-solve" style="flex:2">ШӘШЈЩғЩҠШҜ Ш§Щ„ШӯЩ„ вң…</button>
                <button onclick="closePopups()" class="btn-3d" style="flex:1; background:#888;">ШҘЩ„ШәШ§ШЎ</button>
            </div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playNote(freq, type, duration) {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        const sounds = {
            spin: () => playNote(200 + Math.random()*50, 'sawtooth', 0.05),
            correct: () => { playNote(600, 'sine', 0.2); setTimeout(()=>playNote(850, 'sine', 0.3), 100); },
            wrong: () => { playNote(250, 'square', 0.3); },
            win: () => { [523, 659, 783, 1046].forEach((f, i) => setTimeout(()=>playNote(f, 'sine', 0.5), i*150)); }
        };

        let questions = [], players = [], currentIdx = 0, targetScore = 5000, phrase = "", used = [], rotation = 0, wheelValue = 0, isVowelMode = false;
        const segments = [100, 250, 500, "ШҘЩҒЩ„Ш§Ші рҹ’Җ", 1000, 2000, "ШұШ§ШӯШӘ Ш№Щ„ЩҠЩғ рҹ’Ё", 300, 150, 750];

        const pCount = document.getElementById('p-count');
        const pNamesDiv = document.getElementById('p-names');
        pCount.onchange = () => {
            pNamesDiv.innerHTML = '';
            for(let i=1; i<=pCount.value; i++) pNamesDiv.innerHTML += `<input type="text" id="n${i}" value="Щ…ШӘШіШ§ШЁЩӮ ${i}">`;
        };
        pCount.onchange();

        async function startGame() {
            try { const res = await fetch('questions.json'); questions = await res.json(); } 
            catch(e) { questions = [{"category": "Ш№Ш§Щ…", "phrase": "Ш§Щ„Щ…Щ…Щ„ЩғШ© Ш§Щ„Ш№ШұШЁЩҠШ© Ш§Щ„ШіШ№ЩҲШҜЩҠШ©"}]; }
            targetScore = parseInt(document.getElementById('target').value);
            for(let i=1; i<=pCount.value; i++) players.push({name: document.getElementById('n'+i).value, score: 0});
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            drawWheel(); initRound();
        }

        function initRound() {
            const q = questions[Math.floor(Math.random()*questions.length)];
            phrase = q.phrase; used = [];
            document.getElementById('category-tag').innerText = "Ш§Щ„ЩҒШҰШ©: " + q.category;
            const disp = document.getElementById('phrase-display'); disp.innerHTML = '';
            phrase.split('').forEach(c => {
                const d = document.createElement('div'); d.className = c==' ' ? 'letter-box space' : 'letter-box';
                d.textContent = c; disp.appendChild(d);
            });
            updateUI();
        }

        function drawWheel() {
            const ctx = document.getElementById('wheelCanvas').getContext('2d');
            const step = (Math.PI*2)/segments.length;
            ctx.clearRect(0,0,400,400);
            segments.forEach((s, i) => {
                ctx.beginPath(); ctx.moveTo(200,200); ctx.arc(200,200,190, i*step, (i+1)*step);
                ctx.fillStyle = i%2==0 ? "#2d3436" : "#e94560";
                if(s.toString().includes("ШҘЩҒЩ„Ш§Ші")) ctx.fillStyle="#000";
                ctx.fill(); ctx.strokeStyle="#fff"; ctx.stroke();
                ctx.save(); ctx.translate(200,200); ctx.rotate(i*step + step/2);
                ctx.fillStyle="#fff"; ctx.font="bold 18px Cairo"; ctx.textAlign="right"; ctx.fillText(s, 170, 8); ctx.restore();
            });
        }

        document.getElementById('spin-btn').onclick = () => {
            let spinInt = setInterval(sounds.spin, 120);
            const spin = 1800 + Math.random()*360; rotation += spin;
            const canvas = document.getElementById('wheelCanvas');
            canvas.style.transition = "transform 4s cubic-bezier(0.1, 0, 0.1, 1)";
            canvas.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => {
                clearInterval(spinInt);
                const deg = rotation % 360;
                const idx = Math.floor(((360 - deg + 270) % 360) / (360/segments.length));
                wheelValue = segments[idx];
                if(wheelValue.toString().includes("ШҘЩҒЩ„Ш§Ші")) { flashMsg("рҹ’Җ ШҘЩҒЩ„Ш§Ші!"); players[currentIdx].score = 0; sounds.wrong(); nextTurn(); }
                else if(wheelValue.toString().includes("ШұШ§ШӯШӘ Ш№Щ„ЩҠЩғ")) { flashMsg("рҹ’Ё ШұШ§ШӯШӘ Ш№Щ„ЩҠЩғ!"); sounds.wrong(); nextTurn(); }
                else { flashMsg("рҹҺЎ " + wheelValue + " ЩҶЩӮШ·Ш©!"); showKB(false); }
            }, 4000);
        };

        function normalize(c) {
            if(['ШЈ','ШҘ','Шў','Ш§'].includes(c)) return 'Ш§';
            if(['ЩҮ','Ш©'].includes(c)) return 'ЩҮ';
            return c;
        }

        function showKB(vowelOnly) {
            isVowelMode = vowelOnly;
            document.getElementById('kb-box').classList.add('open');
            const kGrid = document.getElementById('keys'); kGrid.innerHTML = '';
            const list = vowelOnly ? ['ШЈ','ЩҲ','ЩҠ'] : "ШЁШӘШ«Ш¬ШӯШ®ШҜШ°ШұШІШіШҙШөШ¶Ш·ШёШ№ШәЩҒЩӮЩғЩ„Щ…ЩҶЩҮЩҖ".split('');
            list.forEach(l => {
                const b = document.createElement('button'); b.className = `key ${used.includes(l)?'used':''}`;
                b.innerText = l; if(!used.includes(l)) b.onclick = () => handleLetter(l);
                kGrid.appendChild(b);
            });
        }

        function handleLetter(l) {
            used.push(l); closePopups();
            let count = 0;
            phrase.split('').forEach((c, i) => {
                if(normalize(c) === normalize(l)) {
                    document.querySelectorAll('.letter-box')[i].classList.add('revealed');
                    count++;
                }
            });
            if(count > 0) {
                if(isVowelMode) players[currentIdx].score -= 250;
                else players[currentIdx].score += (parseInt(wheelValue) * count);
                flashMsg("вң… ШЈШөШЁШӘ " + count + " Щ…ШұШ©!"); sounds.correct();
                if(players[currentIdx].score >= targetScore) { sounds.win(); flashMsg("рҹ‘‘ ЩҒШІШӘ!"); setTimeout(()=>location.reload(), 3000); }
            } else { flashMsg("вқҢ Ш®Ш·ШЈ!"); sounds.wrong(); nextTurn(); }
            updateUI();
        }

        document.getElementById('solve-btn').onclick = () => document.getElementById('solve-box').classList.add('open');

        function checkFinalSolve() {
            const val = document.getElementById('solve-input').value.trim();
            const nP = phrase.split('').map(normalize).join('').replace(/\s/g, '');
            const nI = val.split('').map(normalize).join('').replace(/\s/g, '');
            if(nI === nP) {
                players[currentIdx].score += 1000; sounds.correct(); flashMsg("вң… ЩғЩҒЩҲ! ШӯЩ„ ШөШӯ");
                if(players[currentIdx].score >= targetScore) { sounds.win(); setTimeout(()=>location.reload(), 3000); }
                else { setTimeout(initRound, 1500); }
            } else { flashMsg("вқҢ Ш®Ш·ШЈ!"); sounds.wrong(); nextTurn(); }
            closePopups();
        }

        document.getElementById('vowel-btn').onclick = () => showKB(true);
        function flashMsg(txt) { const m = document.getElementById('fancy-msg'); m.innerText = txt; m.classList.add('show'); setTimeout(() => m.classList.remove('show'), 2000); }
        function closePopups() { document.getElementById('kb-box').classList.remove('open'); document.getElementById('solve-box').classList.remove('open'); document.getElementById('solve-input').value=""; }
        function nextTurn() { currentIdx = (currentIdx + 1) % players.length; updateUI(); }
        function updateUI() {
            const side = document.getElementById('players-info'); side.innerHTML = '';
            players.forEach((p, i) => { side.innerHTML += `<div class="p-card ${i==currentIdx?'active':''}"><b>${p.name}</b><br><span class="p-score">${p.score}</span></div>`; });
            document.getElementById('vowel-btn').disabled = players[currentIdx].score < 250;
        }
    </script>
</body>
</html>
