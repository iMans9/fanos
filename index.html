<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الفانوس - نسخة منصور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* CSS المدمج */
        :root { --gold: #ffd700; --navy: #0f3460; --red: #e94560; --glass: rgba(255,255,255,0.1); }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: radial-gradient(circle, #1a1a2e, #0a0a14); color: white; height: 100vh; overflow: hidden; }
        .screen { display: none; height: 100%; width: 100%; align-items: center; justify-content: center; flex-direction: column; }
        .screen.active { display: flex; }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; min-width: 400px; }
        .main-btn { background: var(--gold); border: none; padding: 15px 40px; border-radius: 30px; font-weight: 900; cursor: pointer; margin-top: 20px; font-size: 1.2rem; transition: 0.3s; }
        .main-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--gold); }
        #phrase-display { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 30px; min-height: 80px; }
        .letter-box { width: 45px; height: 65px; background: #fff; color: transparent; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .letter-box.revealed { color: #1a1a2e; transform: rotateY(360deg); background: #fff; }
        .letter-box.space { background: transparent; border: none; width: 25px; }
        .game-layout { display: flex; gap: 40px; align-items: center; width: 90%; justify-content: space-around; }
        .player-tag { background: var(--glass); padding: 20px; margin: 10px 0; width: 200px; border-radius: 15px; border-right: 6px solid transparent; transition: 0.3s; }
        .player-tag.active { border-color: var(--gold); background: rgba(255,215,0,0.1); transform: scale(1.05); }
        .wheel-container { position: relative; width: 400px; height: 400px; }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 35px; color: var(--red); z-index: 10; }
        #wheelCanvas { width: 100%; height: 100%; }
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px 25px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-spin { background: var(--red); color: white; }
        .btn-vowel { background: #00cec9; color: white; }
        .btn-solve { background: #6c5ce7; color: white; }
        #keyboard-container { position: fixed; bottom: 30px; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 20px; width: 85%; border: 1px solid var(--gold); }
        #keyboard { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .key { padding: 10px 20px; border-radius: 8px; border: none; background: #fff; font-weight: 900; cursor: pointer; font-size: 1.1rem; }
        .key.used { opacity: 0.2; cursor: not-allowed; }
        .hidden { display: none !important; }
        .badge { background: var(--navy); padding: 10px 20px; border-radius: 50px; font-weight: bold; border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen active">
        <div class="glass-card">
            <h1 style="color:var(--gold); font-size: 3rem; margin-bottom: 20px;">فـانـوس</h1>
            <div style="text-align: right; margin-bottom: 20px;">
                <label>عدد اللاعبين:</label>
                <select id="player-count" style="width:100%; padding:10px; border-radius: 10px; margin-top:5px;">
                    <option value="2">2</option>
                    <option value="3" selected>3</option>
                    <option value="4">4</option>
                </select>
                <div id="name-inputs" style="margin-top: 15px;"></div>
                <label style="display:block; margin-top:15px;">هدف الفوز (نقاط):</label>
                <input type="number" id="target-score" value="3000" style="width:95%; padding:10px; border-radius:10px;">
            </div>
            <button id="start-btn" class="main-btn">دخول المنافسة</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div style="display:flex; gap:20px; margin-bottom: 20px;">
            <div class="badge">الفئة: <span id="category-name">---</span></div>
            <div class="badge" style="color:var(--gold)">الهدف: <span id="goal-display">0</span></div>
        </div>

        <div id="phrase-display"></div>

        <div class="game-layout">
            <aside id="players-sidebar"></aside>

            <div class="wheel-container">
                <div class="pointer">▼</div>
                <canvas id="wheelCanvas" width="400" height="400"></canvas>
                <div class="controls">
                    <button id="spin-btn" class="btn btn-spin">لف العجلة</button>
                    <button id="buy-vowel-btn" class="btn btn-vowel" disabled>شراء حرف مساعد (250)</button>
                    <button id="solve-btn" class="btn btn-solve">حل اللغز</button>
                </div>
            </div>
        </div>

        <div id="keyboard-container" class="hidden">
            <div id="keyboard"></div>
        </div>
    </div>

    <div id="winner-screen" class="screen">
        <div class="glass-card">
            <h1 style="font-size: 4rem;">👑</h1>
            <h2 id="winner-text" style="font-size: 2.5rem; color:var(--gold);"></h2>
            <p id="final-points" style="font-size: 1.5rem;"></p>
            <button onclick="location.reload()" class="main-btn">لعبة جديدة</button>
        </div>
    </div>

    <audio id="sound-spin" src="https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3"></audio>
    <audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/256/256-preview.mp3"></audio>

    <script>
        // JavaScript المدمج
        let questions = [];
        let players = [];
        let currentPlayerIdx = 0;
        let targetScore = 3000;
        let currentPhrase = "";
        let usedLetters = [];
        let wheelValue = 0;
        const wheelSegments = [100, 200, 500, "إفلاس", 1000, 1500, "راحت عليك", 300, 700, 250];

        // 1. جلب الأسئلة من الملف الخارجي
        async function loadQuestions() {
            try {
                const response = await fetch('questions.json');
                questions = await response.json();
            } catch (err) {
                alert("تنبيه: لم يتم العثور على ملف questions.json، سيتم استخدام أسئلة افتراضية.");
                questions = [{ category: "مثال", phrase: "مرحبا بك في فانوس" }];
            }
        }

        // إعداد المدخلات
        const playerCountSelect = document.getElementById('player-count');
        function updateInputs() {
            const div = document.getElementById('name-inputs');
            div.innerHTML = '';
            for(let i=1; i<=playerCountSelect.value; i++) {
                div.innerHTML += `<input type="text" id="p${i}" value="لاعب ${i}" style="width:95%; padding:8px; margin-bottom:5px; border-radius:5px; border:none;">`;
            }
        }
        playerCountSelect.onchange = updateInputs;
        updateInputs();

        // بدء اللعبة
        document.getElementById('start-btn').onclick = async () => {
            await loadQuestions();
            targetScore = parseInt(document.getElementById('target-score').value);
            players = [];
            for(let i=1; i<=playerCountSelect.value; i++) {
                players.push({ name: document.getElementById('p'+i).value, score: 0 });
            }
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('goal-display').innerText = targetScore;
            drawWheel();
            initRound();
        };

        function initRound() {
            const q = questions[Math.floor(Math.random() * questions.length)];
            currentPhrase = q.phrase.toUpperCase();
            usedLetters = [];
            document.getElementById('category-name').innerText = q.category;
            renderPhrase();
            updateUI();
        }

        function renderPhrase() {
            const cont = document.getElementById('phrase-display');
            cont.innerHTML = '';
            currentPhrase.split('').forEach(char => {
                const div = document.createElement('div');
                div.className = char === ' ' ? 'letter-box space' : 'letter-box';
                div.textContent = char;
                cont.appendChild(div);
            });
        }

        // العجلة
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        function drawWheel() {
            const centerX = 200, centerY = 200, radius = 190;
            const step = (Math.PI * 2) / wheelSegments.length;
            wheelSegments.forEach((val, i) => {
                ctx.beginPath(); ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, i * step, (i+1) * step);
                ctx.fillStyle = i % 2 === 0 ? "#1e272e" : "#e94560";
                if(val === "إفلاس") ctx.fillStyle = "#000";
                ctx.fill(); ctx.stroke();
                ctx.save(); ctx.translate(centerX, centerY); ctx.rotate(i * step + step/2);
                ctx.fillStyle = "white"; ctx.font = "bold 18px Cairo"; ctx.fillText(val, 110, 5); ctx.restore();
            });
        }

        let rotation = 0;
        document.getElementById('spin-btn').onclick = () => {
            document.getElementById('sound-spin').play();
            const spin = 1800 + Math.random() * 360;
            rotation += spin;
            canvas.style.transition = "transform 4s cubic-bezier(0.1, 0, 0.2, 1)";
            canvas.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => {
                const actual = rotation % 360;
                const idx = Math.floor((360 - actual) / (360 / wheelSegments.length)) % wheelSegments.length;
                wheelValue = wheelSegments[idx];
                if(wheelValue === "إفلاس") { alert("إفلاس!"); players[currentPlayerIdx].score = 0; nextTurn(); }
                else if(wheelValue === "راحت عليك") { alert("راحت عليك!"); nextTurn(); }
                else { showKeyboard(false); }
            }, 4000);
        };

        function showKeyboard(isVowel) {
            document.getElementById('keyboard-container').classList.remove('hidden');
            const kb = document.getElementById('keyboard'); kb.innerHTML = '';
            const list = isVowel ? ['أ','و','ي'] : "بتثجحخدذرزسشصضطظعغفقكلمنهـ".split('');
            list.forEach(l => {
                const b = document.createElement('button'); b.className = `key ${usedLetters.includes(l)?'used':''}`;
                b.innerText = l; if(!usedLetters.includes(l)) b.onclick = () => handleChoice(l, isVowel);
                kb.appendChild(b);
            });
        }

        function handleChoice(letter, isVowel) {
            usedLetters.push(letter);
            document.getElementById('keyboard-container').classList.add('hidden');
            let count = 0;
            currentPhrase.split('').forEach((char, i) => {
                if(char === letter) { document.querySelectorAll('.letter-box')[i].classList.add('revealed'); count++; }
            });
            if(count > 0) {
                document.getElementById('sound-correct').play();
                if(isVowel) players[currentPlayerIdx].score -= 250;
                else players[currentPlayerIdx].score += (wheelValue * count);
                if(players[currentPlayerIdx].score >= targetScore) showWin();
            } else {
                document.getElementById('sound-wrong').play();
                if(isVowel) players[currentPlayerIdx].score -= 250;
                nextTurn();
            }
            updateUI();
        }

        function nextTurn() { currentPlayerIdx = (currentPlayerIdx + 1) % players.length; updateUI(); }
        
        function updateUI() {
            const side = document.getElementById('players-sidebar'); side.innerHTML = '';
            players.forEach((p, i) => {
                side.innerHTML += `<div class="player-tag ${i===currentPlayerIdx?'active':''}">
                    <strong>${p.name}</strong><br><span style="font-size:1.5rem">${p.score}</span></div>`;
            });
            document.getElementById('buy-vowel-btn').disabled = players[currentPlayerIdx].score < 250;
        }

        document.getElementById('buy-vowel-btn').onclick = () => showKeyboard(true);
        document.getElementById('solve-btn').onclick = () => {
            const sol = prompt("اكتب الجملة كاملة:");
            if(sol && sol.toUpperCase() === currentPhrase) {
                players[currentPlayerIdx].score += 1000; showWin();
            } else { alert("حل خاطئ!"); nextTurn(); }
        };

        function showWin() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('winner-screen').classList.add('active');
            document.getElementById('winner-text').innerText = "البطل: " + players[currentPlayerIdx].name;
            document.getElementById('final-points').innerText = "مجموع النقاط: " + players[currentPlayerIdx].score;
        }
    </script>
</body>
</html>
