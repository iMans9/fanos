    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #ffd700; --red: #e94560; --navy: #0a0a14; --glass: rgba(255, 255, 255, 0.05); --green: #2ecc71; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--navy); color: white; height: 100vh; overflow: hidden; }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .screen.active { display: flex; }

        /* التنبيهات */
        #announcement-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 3000; opacity: 0; pointer-events: none; transition: 0.5s; }
        #announcement-overlay.show { opacity: 1; pointer-events: auto; }
        .big-text { font-size: 3.5rem; font-weight: 900; color: var(--gold); text-align: center; }

        /* التوزيع العرضي */
        #game-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            grid-template-rows: 80px 1fr 120px;
            height: 100vh; width: 100vw; gap: 15px; padding: 15px;
        }

        .header-area { grid-column: 1 / 3; display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 0 25px; border-radius: 15px; }
        .board-area { grid-column: 1; background: var(--glass); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
        .wheel-area { grid-column: 2; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); border-radius: 20px; }
        .controls-area { grid-column: 1 / 3; background: var(--glass); border-radius: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; }

        /* الفئة بخط كبير */
        #cat-label { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin-bottom: 20px; text-shadow: 0 0 15px rgba(255,215,0,0.3); }

        /* لوحة الحروف */
        #phrase-display { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .letter-box { width: 45px; height: 60px; background: #fff; color: transparent; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900; transition: 0.6s; box-shadow: 0 4px 0 #bbb; }
        .letter-box.revealed { color: #000; transform: rotateY(360deg); }
        .letter-box.space { background: transparent; width: 20px; box-shadow: none; }

        /* الدوامة */
        .wheel-container { position: relative; width: 300px; height: 300px; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #fff; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 35px; color: var(--red); z-index: 10; }

        /* المتسابقين وتأثير النشاط */
        #players-row { display: flex; gap: 15px; }
        .p-tag { padding: 10px 20px; border-radius: 12px; background: rgba(255,255,255,0.1); text-align: center; min-width: 100px; transition: 0.3s; border: 2px solid transparent; }
        .p-tag.active { 
            border-color: var(--gold); 
            background: rgba(255,215,0,0.2); 
            box-shadow: 0 0 20px var(--gold);
            transform: scale(1.1);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1.1); box-shadow: 0 0 10px var(--gold); }
            50% { transform: scale(1.15); box-shadow: 0 0 30px var(--gold); }
            100% { transform: scale(1.1); box-shadow: 0 0 10px var(--gold); }
        }

        /* الأزرار */
        .btn { padding: 12px 30px; border-radius: 50px; border: none; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.2s; font-family: 'Cairo'; }
        .btn-spin { background: var(--red); color: white; }
        .btn-vowel { background: #00cec9; color: white; }
        .btn-solve { background: var(--green); color: white; }
        .btn-next { background: #555; color: white; font-size: 0.9rem; padding: 8px 20px; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* الكيبورد */
        #keyboard-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; }
        #keyboard-content { background: #1a1a2e; padding: 25px; border-radius: 25px; border: 2px solid var(--gold); text-align: center; }
        .key-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
        .key { width: 50px; height: 50px; border-radius: 10px; border: none; background: #fff; font-weight: 900; font-size: 1.5rem; cursor: pointer; color: #000; }
        .key.used { opacity: 0.3; }
        .hidden { display: none !important; }
    </style>

            </div>
        </div>
    </div>

    <div id="keyboard-overlay">

    </div>

        ];

        let players = [], currentIdx = 0, phrase = "", used = [], rotation = 0, wheelValue = 0, round = 1;
        const segments = [100, 200, 500, "إفلاس", 1000, 1500, "راحت عليك", 300, 700, 250];

        // أهم وظيفة لحل مشكلة الصوت في المتصفحات
        function playSound(id) {
            const s = document.getElementById(id);
            if (s) {
                s.currentTime = 0;
                s.play().catch(() => console.log("الصوت محجوب حتى يتم التفاعل"));
            }
        }

        function normalize(c) {
            if (['أ', 'إ', 'آ', 'ا'].includes(c)) return 'ا';
            if (['ة', 'ه'].includes(c)) return 'ه';
            if (['ى', 'ي'].includes(c)) return 'ي';
            return c;
        }

        function announce(main, sub, time = 3000, isFinal = false) {
            const over = document.getElementById('announcement-overlay');
            document.getElementById('main-announcement').innerText = main;
            document.getElementById('sub-announcement').innerText = sub;
            const btn = document.getElementById('close-announcer');
            if(isFinal) { btn.classList.remove('hidden'); btn.onclick = () => location.reload(); }
            else { btn.classList.add('hidden'); }
            over.classList.add('show');
            if(time > 0) setTimeout(() => over.classList.remove('show'), time);
        }

        document.getElementById('start-game').onclick = () => {
            // "تنشيط" الأصوات برمجياً عند أول ضغطة
            ['snd-spin', 'snd-correct', 'snd-wrong', 'snd-round-win', 'snd-total-win'].forEach(id => {
                const a = document.getElementById(id);
                a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {});
            });

            for(let i=1; i<=3; i++) players.push({name: document.getElementById('n'+i).value, score: 0});
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            drawWheel();
            startSequence();
        };

        function drawWheel() {
            const ctx = document.getElementById('wheelCanvas').getContext('2d');
            const step = (Math.PI*2)/segments.length;
            segments.forEach((s, i) => {
                ctx.beginPath(); ctx.moveTo(200,200); ctx.arc(200,200,190, i*step, (i+1)*step);
                ctx.fillStyle = i % 2 === 0 ? "#2d3436" : "#e94560";
                if(s == "إفلاس") ctx.fillStyle = "#000"; 
                if(s == "راحت عليك") ctx.fillStyle = "#555";
                ctx.fill(); ctx.strokeStyle = "#fff"; ctx.stroke();
                ctx.save(); ctx.translate(200,200); ctx.rotate(i*step + step/2);
                ctx.fillStyle = "#fff"; ctx.font = "bold 18px Cairo"; ctx.textAlign = "right"; ctx.fillText(s, 175, 5); ctx.restore();
            });
        }

        function startSequence() {
            if (round === 1) {
                announce("الجولة الأولى", "جولة الدوامة.. ابدأوا بجمع النقاط!");
                initRound();
            } else if (round === 2) {
                announce("الجولة الثانية", "الجولة الأخيرة والحسم!");
                document.getElementById('round-label').innerText = "الجولة الثانية: الجولة الأخيرة";
                initRound();
            } else {
                declareWinner();
            }
        }

        function initRound() {
            const q = questions[Math.floor(Math.random()*questions.length)];
            phrase = q.phrase; used = [];
            document.getElementById('cat-label').innerText = "الفئة: " + q.category;
            const disp = document.getElementById('phrase-display'); disp.innerHTML = '';
            phrase.split('').forEach(c => {
                const d = document.createElement('div');
                d.className = c == ' ' ? 'letter-box space' : 'letter-box';
                d.textContent = c; disp.appendChild(d);
            });
            updateUI();
        }

        // تفعيل زر تغيير السؤال
        document.getElementById('next-question-btn').onclick = () => {
            initRound();
            announce("سؤال جديد", "تم تغيير السؤال بنجاح", 1500);
        };

        document.getElementById('spin-btn').onclick = () => {
            playSound('snd-spin');
            rotation += 1800 + Math.random()*360;
            const canvas = document.getElementById('wheelCanvas');
            canvas.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => {
                const deg = rotation % 360;
                const idx = Math.floor(((360 - deg + 270) % 360) / (360/segments.length));
                wheelValue = segments[idx];
                if(wheelValue == "إفلاس") { playSound('snd-wrong'); players[currentIdx].score = 0; nextTurn(); }
                else if(wheelValue == "راحت عليك") { playSound('snd-wrong'); nextTurn(); }
                else openKB(false);
            }, 4000);
        };

        function openKB(vowelMode) {
            document.getElementById('keyboard-overlay').style.display = 'flex';
            const cont = document.getElementById('keys-container'); cont.innerHTML = '';
            const letters = vowelMode ? ['أ','و','ي'] : "بتثجحخدذرزسشصضطظعغفقكلمنهـ".split('');
            letters.forEach(l => {
                const btn = document.createElement('button');
                const normL = normalize(l);
                btn.className = `key ${used.includes(normL) ? 'used' : ''}`;
                btn.innerText = l;
                if(!used.includes(normL)) btn.onclick = () => handleChoice(l, vowelMode);
                cont.appendChild(btn);
            });
        }

        function handleChoice(l, isVowel) {
            const norm = normalize(l); used.push(norm); closeKB();
            let count = 0;
            phrase.split('').forEach((c, i) => { if(normalize(c) === norm) { document.querySelectorAll('.letter-box')[i].classList.add('revealed'); count++; } });
            if(count > 0) {
                playSound('snd-correct');
                if(isVowel) players[currentIdx].score -= 250;
                else players[currentIdx].score += (wheelValue * count);
                if(isSolved()) finishRound();
            } else {
                playSound('snd-wrong');
                nextTurn();
            }
            updateUI();
        }

        function finishRound() {
            playSound('snd-round-win');
            round++;
            if (round <= 2) {
                announce("أحسنت!", "ننتقل للجولة الأخيرة..", 3000);
                setTimeout(startSequence, 3100);
            } else {
                startSequence();
            }
        }

        function declareWinner() {
            playSound('snd-total-win');
            let winner = players[0];
            players.forEach(p => { if(p.score > winner.score) winner = p; });
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
            announce("بطل سباق الحروف! 🏆", `الفائز هو ${winner.name} بـ ${winner.score} نقطة`, 0, true);
        }

        function isSolved() {
            const revealed = document.querySelectorAll('.letter-box.revealed').length;
            const total = phrase.replace(/\s/g, '').length;
            return revealed === total;
        }

        document.getElementById('solve-btn').onclick = () => {
            const attempt = prompt("اكتب الحل كاملاً:");
            if(!attempt) return;
            if(attempt.split('').map(normalize).join('') === phrase.split('').map(normalize).join('')) {
                players[currentIdx].score += 500;
                finishRound();
            } else {
                playSound('snd-wrong');
                nextTurn();
            }
        };

        function nextTurn() { currentIdx = (currentIdx + 1) % players.length; updateUI(); }
        function closeKB() { document.getElementById('keyboard-overlay').style.display = 'none'; }

        function updateUI() {
            const row = document.getElementById('players-row'); row.innerHTML = '';
            players.forEach((p, i) => {
                row.innerHTML += `<div class="p-tag ${i === currentIdx ? 'active' : ''}"><b>${p.name}</b><br>${p.score}</div>`;
            });
            document.getElementById('vowel-btn').disabled = players[currentIdx].score < 250;
        }
        document.getElementById('vowel-btn').onclick = () => openKB(true);
    </script>
