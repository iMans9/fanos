<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فانوس - النسخة الذهبية 🏆</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --red: #e94560; --navy: #0f3460; --glass: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; font-family: 'Cairo', sans-serif; 
            background: #0c2461; color: white; 
            height: 100vh; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
        }
        
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px; padding-top: 40px; }
        .screen.active { display: flex; }

        /* شاشة الإعداد */
        .setup-card { background: var(--glass); backdrop-filter: blur(20px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); width: 90%; max-width: 400px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: none; font-weight: bold; text-align: center; }
        .main-btn { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 50px; font-weight: 900; cursor: pointer; width: 100%; font-size: 1.2rem; }

        /* منطقة الحروف - معدلة للظهور */
        #phrase-display { 
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; 
            width: 100%; min-height: 120px; margin: 20px 0; z-index: 5;
        }
        .letter-box { 
            width: 40px; height: 55px; background: #fff; color: #fff; 
            border-radius: 5px; display: flex; align-items: center; justify-content: center; 
            font-size: 1.8rem; font-weight: 900; transition: 0.5s;
            box-shadow: 0 4px 0 #ccc;
        }
        .letter-box.revealed { color: #1a1a2e; background: var(--gold); box-shadow: 0 4px 0 #b8860b; }
        .letter-box.space { background: transparent; width: 20px; box-shadow: none; }

        /* الدوامة - معدلة للظهور */
        .wheel-wrapper { position: relative; width: 280px; height: 280px; margin: 10px 0; }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 30px; color: #ff0000; z-index: 20; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #fff; display: block; }

        /* التحكم واللاعبين */
        #players-row { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; width: 100%; justify-content: center; }
        .p-card { background: var(--glass); padding: 10px; border-radius: 10px; border-bottom: 3px solid transparent; min-width: 80px; text-align: center; }
        .p-card.active { border-color: var(--gold); background: rgba(255,215,0,0.2); }
        
        .actions { display: flex; gap: 8px; }
        .act-btn { padding: 10px 15px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; font-size: 0.8rem; }
        .btn-spin { background: var(--red); color: white; }
        .btn-vowel { background: #00cec9; color: white; }
        .btn-change { background: #6c5ce7; color: white; }

        /* الكيبورد */
        #kb-box { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); padding: 15px; transform: translateY(100%); transition: 0.4s; z-index: 100; border-radius: 20px 20px 0 0; }
        #kb-box.open { transform: translateY(0); }
        .key-grid { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .key { padding: 12px; min-width: 40px; border-radius: 8px; border: none; background: #fff; font-weight: bold; }
        .key.used { opacity: 0.2; }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen active">
        <div class="setup-card">
            <h1 style="color:var(--gold); margin:0;">فـانـوس</h1>
            <select id="p-count">
                <option value="2">2 متسابقين</option>
                <option value="3" selected>3 متسابقين</option>
            </select>
            <div id="p-names-inputs"></div>
            <input type="number" id="target-input" value="3000">
            <button id="start-btn" class="main-btn">ابدأ اللعب 🚀</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="players-row"></div>
        <div id="phrase-display"></div>
        
        <div class="wheel-wrapper">
            <div class="wheel-pointer">▼</div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>

        <div class="actions">
            <button id="spin-btn" class="act-btn btn-spin">لف العجلة 🎡</button>
            <button id="vowel-btn" class="act-btn btn-vowel" disabled>مساعدة (250)</button>
            <button id="change-btn" class="act-btn btn-change">تغيير السؤال 🔄</button>
        </div>

        <div id="kb-box">
            <div class="key-grid" id="keys"></div>
            <button onclick="document.getElementById('kb-box').classList.remove('open')" style="width:100%; margin-top:10px; background:var(--red); color:white; border:none; padding:10px; border-radius:5px;">إغلاق</button>
        </div>
    </div>

    <audio id="s-spin" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
    <audio id="s-correct" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
    <audio id="s-wrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

    <script>
        let questions = [
            {"category": "كرة قدم", "phrase": "ريال مدريد نادي القرن"},
            {"category": "معلومات", "phrase": "المملكة العربية السعودية"},
            {"category": "أمثال", "phrase": "من جد وجد"}
        ];

        let players = [], currentIdx = 0, target = 3000, phrase = "", used = [], rotation = 0, wheelValue = 0;
        const segments = [100, 250, 500, "إفلاس", 1000, 2000, "راحت عليك", 300, 150, 750];

        const pCountSel = document.getElementById('p-count');
        const pNamesDiv = document.getElementById('p-names-inputs');
        function updateInps() {
            pNamesDiv.innerHTML = '';
            for(let i=1; i<=pCountSel.value; i++) pNamesDiv.innerHTML += `<input type="text" id="nn${i}" value="لاعب ${i}">`;
        }
        pCountSel.onchange = updateInps; updateInps();

        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const step = (Math.PI*2)/segments.length;
            ctx.clearRect(0,0,400,400);
            segments.forEach((s, i) => {
                ctx.beginPath(); ctx.moveTo(200,200); ctx.arc(200,200,190, i*step, (i+1)*step);
                ctx.fillStyle = i%2==0 ? "#2d3436" : "#e94560";
                if(s=="إفلاس") ctx.fillStyle="#000";
                ctx.fill(); ctx.strokeStyle="#fff"; ctx.stroke();
                ctx.save(); ctx.translate(200,200); ctx.rotate(i*step + step/2);
                ctx.fillStyle="#fff"; ctx.font="bold 18px Cairo"; ctx.textAlign="right"; ctx.fillText(s, 175, 8); ctx.restore();
            });
        }

        document.getElementById('start-btn').onclick = () => {
            target = parseInt(document.getElementById('target-input').value);
            for(let i=1; i<=pCountSel.value; i++) players.push({name: document.getElementById('nn'+i).value, score: 0});
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            drawWheel(); 
            initRound();
        };

        function initRound() {
            const q = questions[Math.floor(Math.random()*questions.length)];
            phrase = q.phrase; used = [];
            const disp = document.getElementById('phrase-display'); disp.innerHTML = '';
            phrase.split('').forEach(c => {
                const d = document.createElement('div');
                d.className = c==' ' ? 'letter-box space' : 'letter-box';
                d.textContent = c; disp.appendChild(d);
            });
            updateUI();
        }

        document.getElementById('spin-btn').onclick = () => {
            document.getElementById('s-spin').play().catch(()=>{});
            const spin = 1800 + Math.random()*360;
            rotation += spin;
            const canvas = document.getElementById('wheelCanvas');
            canvas.style.transition = "transform 4s cubic-bezier(0.15, 0, 0.15, 1)";
            canvas.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => {
                const deg = rotation % 360;
                const idx = Math.floor(((360 - deg + 270) % 360) / (360/segments.length));
                wheelValue = segments[idx];
                if(wheelValue=="إفلاس") { alert("إفلاس!"); players[currentIdx].score=0; nextTurn(); }
                else if(wheelValue=="راحت عليك") { alert("راحت عليك!"); nextTurn(); }
                else { showKB(false); }
            }, 4000);
        };

        function showKB(v) {
            document.getElementById('kb-box').classList.add('open');
            const kGrid = document.getElementById('keys'); kGrid.innerHTML = '';
            const lets = v ? ['أ','و','ي'] : "بتثجحخدذرزسشصضطظعغفقكلمنهـ".split('');
            lets.forEach(l => {
                const b = document.createElement('button'); b.className = `key ${used.includes(l)?'used':''}`;
                b.innerText = l; if(!used.includes(l)) b.onclick = () => handleChoice(l, v);
                kGrid.appendChild(b);
            });
        }

        function handleChoice(l, v) {
            used.push(l); document.getElementById('kb-box').classList.remove('open');
            let count = 0;
            phrase.split('').forEach((c, i) => {
                if(c == l) { document.querySelectorAll('.letter-box')[i].classList.add('revealed'); count++; }
            });
            if(count > 0) {
                document.getElementById('s-correct').play().catch(()=>{});
                if(v) players[currentIdx].score -= 250;
                else players[currentIdx].score += (wheelValue * count);
            } else {
                document.getElementById('s-wrong').play().catch(()=>{}); nextTurn();
            }
            updateUI();
        }

        function nextTurn() { currentIdx = (currentIdx + 1) % players.length; updateUI(); }
        function updateUI() {
            const row = document.getElementById('players-row'); row.innerHTML = '';
            players.forEach((p, i) => {
                row.innerHTML += `<div class="p-card ${i==currentIdx?'active':''}"><b>${p.name}</b><br>${p.score}</div>`;
            });
            document.getElementById('vowel-btn').disabled = players[currentIdx].score < 250;
        }

        document.getElementById('change-btn').onclick = () => { initRound(); nextTurn(); };
        document.getElementById('vowel-btn').onclick = () => showKB(true);
    </script>
</body>
</html>
