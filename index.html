<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فانوس 3D - نسخة منصور الملكية 🏆</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --red: #ff4757; --navy: #0a3d62; --bg: #1e272e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); 
            color: white; height: 100vh; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
        }

        /* التصميم الثلاثي الأبعاد 3D */
        .glass-3d {
            background: linear-gradient(145deg, #2c3e50, #000000);
            border-radius: 30px; box-shadow: 10px 10px 30px #0c0c14, -10px -10px 30px #2a2a3a;
            border: 1px solid rgba(255,255,255,0.1); padding: 30px; text-align: center;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .screen.active { display: flex; animation: slideIn 0.5s ease; }

        /* لوحة الحروف 3D */
        #phrase-display { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; perspective: 1000px; }
        .letter-box { 
            width: 42px; height: 58px; background: #f1f2f6; color: transparent;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 900; transition: 0.6s;
            box-shadow: 0 6px 0 #bdc3c7, 0 10px 20px rgba(0,0,0,0.5);
        }
        .letter-box.revealed { color: #1a1a2e; background: var(--gold); transform: rotateX(360deg); box-shadow: 0 6px 0 #b8860b; }
        .letter-box.space { background: transparent; width: 20px; box-shadow: none; }

        /* الدوامة */
        .wheel-container { position: relative; width: 320px; height: 320px; margin: 20px 0; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 10px solid #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 40px; color: var(--red); z-index: 10; filter: drop-shadow(0 4px 5px #000); }

        /* التنبيه الخرافي المدمج */
        #fancy-msg { 
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(45deg, var(--gold), #ff9f43); color: #000;
            padding: 20px 40px; border-radius: 50px; font-weight: 900; font-size: 1.8rem;
            z-index: 1000; box-shadow: 0 0 50px rgba(255, 215, 0, 0.6);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #fancy-msg.show { transform: translate(-50%, -50%) scale(1); }

        /* أزرار 3D */
        .btn-3d {
            padding: 15px 30px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer;
            box-shadow: 0 6px 0 #2c3e50; transition: 0.2s; font-family: inherit; margin: 5px;
        }
        .btn-3d:active { transform: translateY(4px); box-shadow: 0 2px 0 #2c3e50; }
        .btn-spin { background: var(--red); color: white; box-shadow: 0 6px 0 #b33939; }
        .btn-solve { background: #2ecc71; color: white; box-shadow: 0 6px 0 #219150; }

        /* اللاعبين */
        #players-info { display: flex; gap: 10px; margin-bottom: 20px; }
        .p-card { 
            padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.05);
            border: 2px solid transparent; min-width: 100px;
        }
        .p-card.active { border-color: var(--gold); box-shadow: 0 0 20px var(--gold); background: rgba(255,215,0,0.1); }
        .p-score { display: block; font-size: 1.5rem; font-weight: 900; color: var(--gold); }

        /* الكيبورد */
        #kb-box { 
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); 
            padding: 20px; border-radius: 30px 30px 0 0; transform: translateY(100%); transition: 0.4s;
        }
        #kb-box.open { transform: translateY(0); }
        .key { padding: 12px; margin: 4px; border-radius: 10px; border: none; background: #fff; font-weight: bold; cursor: pointer; min-width: 45px; }

        .hidden { display: none !important; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="fancy-msg">🏆 إفلاس!</div>

    <div id="setup-screen" class="screen active">
        <div class="glass-3d" style="width: 90%; max-width: 450px;">
            <h1 style="color:var(--gold); font-size: 3.5rem; margin:0;">فـانـوس</h1>
            <div id="setup-form">
                <select id="p-count" style="width:100%; padding:12px; border-radius:10px; margin:10px 0;">
                    <option value="2">لاعبين (2)</option>
                    <option value="3" selected>ثلاثة لاعبين (3)</option>
                </select>
                <div id="p-names"></div>
                <input type="number" id="target" value="5000" style="width:100%; padding:12px; border-radius:10px; margin:10px 0;">
                <button onclick="startGame()" class="btn-3d btn-spin" style="width:100%; font-size: 1.5rem;">انطلق 🚀</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="players-info"></div>
        <div id="phrase-display"></div>
        
        <div class="wheel-container">
            <div class="pointer">▼</div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>

        <div class="actions">
            <button id="spin-btn" class="btn-3d btn-spin">لف العجلة 🎡</button>
            <button id="solve-btn" class="btn-3d btn-solve">أعرف الحل! 💡</button>
            <button id="vowel-btn" class="btn-3d" style="background:#00cec9; color:#fff;" disabled>مساعدة (250)</button>
        </div>

        <div id="kb-box">
            <div id="keys" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
            <button onclick="document.getElementById('kb-box').classList.remove('open')" style="width:100%; background:var(--red); color:white; border:none; padding:10px; border-radius:10px; margin-top:10px; font-weight:bold;">إغلاق</button>
        </div>
    </div>

    <script>
        // --- نظام الصوت البرمجي (يعمل بدون روابط) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playNote(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            spin: () => playNote(200 + Math.random()*100, 'sawtooth', 0.1),
            correct: () => { playNote(600, 'sine', 0.2); setTimeout(()=>playNote(800, 'sine', 0.3), 100); },
            wrong: () => { playNote(300, 'square', 0.2); setTimeout(()=>playNote(200, 'square', 0.4), 150); },
            win: () => { [523, 659, 783, 1046].forEach((f, i) => setTimeout(()=>playNote(f, 'sine', 0.5), i*150)); }
        };

        // --- منطق اللعبة ---
        let questions = [], players = [], currentIdx = 0, targetScore = 5000, phrase = "", used = [], rotation = 0, wheelValue = 0;
        const segments = [100, 250, 500, "إفلاس 💀", 1000, 2000, "راحت عليك 💨", 300, 150, 750];

        const pCount = document.getElementById('p-count');
        const pNamesDiv = document.getElementById('p-names');
        pCount.onchange = () => {
            pNamesDiv.innerHTML = '';
            for(let i=1; i<=pCount.value; i++) pNamesDiv.innerHTML += `<input type="text" id="n${i}" value="متسابق ${i}" style="width:100%; padding:10px; margin:5px 0; border-radius:8px;">`;
        };
        pCount.onchange();

        async function startGame() {
            try { const res = await fetch('questions.json'); questions = await res.json(); } 
            catch(e) { questions = [{"category": "عام", "phrase": "المملكة العربية السعودية"}]; }
            
            targetScore = parseInt(document.getElementById('target').value);
            for(let i=1; i<=pCount.value; i++) {
                players.push({name: document.getElementById('n'+i).value, score: 0});
            }
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            drawWheel(); initRound();
        }

        function initRound() {
            const q = questions[Math.floor(Math.random()*questions.length)];
            phrase = q.phrase; used = [];
            const disp = document.getElementById('phrase-display'); disp.innerHTML = '';
            phrase.split('').forEach(c => {
                const d = document.createElement('div');
                d.className = c==' ' ? 'letter-box space' : 'letter-box';
                d.textContent = c; disp.appendChild(d);
            });
            updateUI();
        }

        function drawWheel() {
            const ctx = document.getElementById('wheelCanvas').getContext('2d');
            const step = (Math.PI*2)/segments.length;
            ctx.clearRect(0,0,400,400);
            segments.forEach((s, i) => {
                ctx.beginPath(); ctx.moveTo(200,200); ctx.arc(200,200,190, i*step, (i+1)*step);
                ctx.fillStyle = i%2==0 ? "#2d3436" : "#e94560";
                if(s.toString().includes("إفلاس")) ctx.fillStyle="#000";
                ctx.fill(); ctx.strokeStyle="#fff"; ctx.stroke();
                ctx.save(); ctx.translate(200,200); ctx.rotate(i*step + step/2);
                ctx.fillStyle="#fff"; ctx.font="bold 20px Cairo"; ctx.textAlign="right"; ctx.fillText(s, 170, 8); ctx.restore();
            });
        }

        document.getElementById('spin-btn').onclick = () => {
            let spinInt = setInterval(sounds.spin, 150);
            const spin = 1800 + Math.random()*360;
            rotation += spin;
            const canvas = document.getElementById('wheelCanvas');
            canvas.style.transition = "transform 4s cubic-bezier(0.1, 0, 0.1, 1)";
            canvas.style.transform = `rotate(${rotation}deg)`;
            
            setTimeout(() => {
                clearInterval(spinInt);
                const deg = rotation % 360;
                const idx = Math.floor(((360 - deg + 270) % 360) / (360/segments.length));
                wheelValue = segments[idx];
                
                if(wheelValue.toString().includes("إفلاس")) {
                    flashMsg("💀 إفلاس!"); players[currentIdx].score = 0; sounds.wrong(); nextTurn();
                } else if(wheelValue.toString().includes("راحت عليك")) {
                    flashMsg("💨 راحت عليك!"); sounds.wrong(); nextTurn();
                } else {
                    flashMsg("🎡 " + wheelValue + " نقطة!"); showKB();
                }
            }, 4000);
        };

        function normalize(c) {
            if(['أ','إ','آ','ا'].includes(c)) return 'ا';
            if(['ه','ة'].includes(c)) return 'ه';
            return c;
        }

        function handleLetter(l) {
            used.push(l); document.getElementById('kb-box').classList.remove('open');
            let count = 0;
            phrase.split('').forEach((c, i) => {
                if(normalize(c) === normalize(l)) {
                    document.querySelectorAll('.letter-box')[i].classList.add('revealed');
                    count++;
                }
            });

            if(count > 0) {
                players[currentIdx].score += (parseInt(wheelValue) * count);
                flashMsg("✅ أصبت " + count + " مرة!"); sounds.correct();
                if(players[currentIdx].score >= targetScore) { sounds.win(); flashMsg("👑 فاز " + players[currentIdx].name + "!"); setTimeout(()=>location.reload(), 3000); }
            } else {
                flashMsg("❌ خطأ!"); sounds.wrong(); nextTurn();
            }
            updateUI();
        }

        function showKB() {
            document.getElementById('kb-box').classList.add('open');
            const kGrid = document.getElementById('keys'); kGrid.innerHTML = '';
            "أبتثجحخدذرزسشصضطظعغفقكلمنهـ".split('').forEach(l => {
                const b = document.createElement('button'); b.className = `key ${used.includes(l)?'used':''}`;
                b.innerText = l; if(!used.includes(l)) b.onclick = () => handleLetter(l);
                kGrid.appendChild(b);
            });
        }

        function flashMsg(txt) {
            const m = document.getElementById('fancy-msg'); m.innerText = txt;
            m.classList.add('show'); setTimeout(() => m.classList.remove('show'), 2500);
        }

        function nextTurn() { currentIdx = (currentIdx + 1) % players.length; updateUI(); }
        function updateUI() {
            const side = document.getElementById('players-info'); side.innerHTML = '';
            players.forEach((p, i) => {
                side.innerHTML += `<div class="p-card ${i==currentIdx?'active':''}"><b>${p.name}</b><br><span class="p-score">${p.score}</span></div>`;
            });
        }
    </script>
</body>
</html>
