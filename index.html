<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فانوس - التصميم العرضي والجولة النهائية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #ffd700; --red: #e94560; --navy: #0a0a14; --glass: rgba(255, 255, 255, 0.05); --green: #2ecc71; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--navy); color: white; height: 100vh; overflow: hidden; }

        /* الشاشات */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .screen.active { display: flex; }

        /* التنبيهات الإعلانية */
        #announcement-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: center;
            z-index: 3000; opacity: 0; pointer-events: none; transition: 0.5s;
        }
        #announcement-overlay.show { opacity: 1; pointer-events: auto; }
        .big-text { font-size: 3.5rem; font-weight: 900; color: var(--gold); text-align: center; }

        /* واجهة اللعبة العرضية */
        #game-layout {
            display: grid;
            grid-template-columns: 1fr 400px; /* لوحة يسار | دوامة يمين */
            grid-template-rows: 100px 1fr 150px; /* شريط علوي | محتوى | تحكم سفلي */
            height: 100vh; width: 100vw; gap: 20px; padding: 20px;
        }

        .header-area { grid-column: 1 / 3; display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 0 30px; border-radius: 20px; }
        .board-area { grid-column: 1; background: var(--glass); border-radius: 25px; display: flex; flex-direction: column; justify-content: center; padding: 20px; }
        .wheel-area { grid-column: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); border-radius: 25px; }
        .controls-area { grid-column: 1 / 3; background: var(--glass); border-radius: 25px; display: flex; justify-content: center; align-items: center; gap: 20px; }

        /* لوحة الحروف */
        #phrase-display { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .letter-box { width: 50px; height: 70px; background: #fff; color: transparent; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; transition: 0.6s; }
        .letter-box.revealed { color: #000; transform: rotateY(360deg); }
        .letter-box.space { background: transparent; width: 25px; }

        /* الدوامة */
        .wheel-container { position: relative; width: 350px; height: 350px; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #fff; }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 40px; color: var(--red); z-index: 10; }

        /* المتسابقين */
        #players-row { display: flex; gap: 15px; }
        .p-tag { padding: 10px 20px; border-radius: 15px; background: rgba(255,255,255,0.1); border-bottom: 5px solid transparent; text-align: center; min-width: 120px; }
        .p-tag.active { border-color: var(--gold); background: rgba(255,215,0,0.15); transform: scale(1.05); }

        /* الأزرار */
        .btn { padding: 15px 35px; border-radius: 50px; border: none; font-weight: 900; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .btn-spin { background: var(--red); color: white; }
        .btn-vowel { background: #00cec9; color: white; }
        .btn-solve { background: var(--green); color: white; }
        .btn-vowel:disabled { background: #444; cursor: not-allowed; }

        /* الكيبورد المدمج */
        #keyboard-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; }
        #keyboard-content { background: var(--navy); padding: 30px; border-radius: 30px; border: 2px solid var(--gold); text-align: center; max-width: 800px; }
        .key-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
        .key { width: 50px; height: 50px; border-radius: 10px; border: none; background: #fff; font-weight: 900; font-size: 1.5rem; cursor: pointer; }
        .key.used { opacity: 0.2; }

        /* مؤقت الجولة النهائية */
        #final-timer { font-size: 3rem; color: var(--red); font-weight: 900; display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="announcement-overlay">
        <div class="announcement-card">
            <h1 id="main-announcement" class="big-text">الجولة الأولى</h1>
            <p id="sub-announcement" style="font-size: 1.5rem; text-align: center;"></p>
            <button id="final-start-btn" class="btn btn-solve hidden" style="margin-top:20px;">ابدأ تحدي الفانوس</button>
        </div>
    </div>

    <div id="setup-screen" class="screen active">
        <div style="background: var(--glass); padding: 40px; border-radius: 30px; border: 1px solid var(--gold); text-align: center;">
            <h1 style="font-size: 3rem; color: var(--gold);">فـانـوس</h1>
            <div id="p-inputs">
                <input type="text" id="n1" value="متسابق 1" style="display:block; width:300px; padding:10px; margin:10px auto; border-radius:10px; border:none;">
                <input type="text" id="n2" value="متسابق 2" style="display:block; width:300px; padding:10px; margin:10px auto; border-radius:10px; border:none;">
                <input type="text" id="n3" value="متسابق 3" style="display:block; width:300px; padding:10px; margin:10px auto; border-radius:10px; border:none;">
            </div>
            <button id="start-game" class="btn btn-spin" style="margin-top:20px;">دخول المسابقة</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-layout">
            <div class="header-area">
                <div id="round-title" style="font-size: 1.5rem; font-weight: 900; color: var(--gold);">الجولة الأولى: تجميع النقاط</div>
                <div id="players-row"></div>
                <div id="final-timer">30</div>
            </div>

            <div class="board-area">
                <div id="cat-display" style="text-align:center; font-size: 1.2rem; color: var(--gold); margin-bottom: 20px;">الفئة: ---</div>
                <div id="phrase-display"></div>
            </div>

            <div class="wheel-area">
                <div class="wheel-container">
                    <div class="pointer">▼</div>
                    <canvas id="wheelCanvas" width="400" height="400"></canvas>
                </div>
            </div>

            <div class="controls-area">
                <button id="spin-btn" class="btn btn-spin">لف الدوامة</button>
                <button id="vowel-btn" class="btn btn-vowel" disabled>شراء حرف (ا و ي)</button>
                <button id="solve-btn" class="btn btn-solve">أعرف الحل!</button>
            </div>
        </div>
    </div>

    <div id="keyboard-overlay">
        <div id="keyboard-content">
            <h2 id="kb-title">اختر حرفاً</h2>
            <div class="key-grid" id="keys-container"></div>
            <button onclick="closeKB()" style="margin-top:20px; background:none; border:1px solid #fff; color:#fff; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <script>
        const questions = [
            {"category": "كرة قدم", "phrase": "ريال مدريد نادي القرن"},
            {"category": "أمثال شعبية", "phrase": "الوقت كالسيف"},
            {"category": "تقنية", "phrase": "الذكاء الاصطناعي"},
            {"category": "معلومات", "phrase": "المملكة العربية السعودية"},
            {"category": "أمثال شعبية", "phrase": "لسانك حصانك"},
            {"category": "تحدي الفانوس", "phrase": "من جد وجد ومن زرع حصد"}
        ];

        let players = [], currentIdx = 0, phrase = "", used = [], rotation = 0, wheelValue = 0, round = 1;
        const segments = [100, 200, 500, "إفلاس", 1000, 1500, "راحت عليك", 300, 700, 250];

        function normalize(c) {
            if (['أ', 'إ', 'آ', 'ا'].includes(c)) return 'ا';
            if (['ة', 'ه'].includes(c)) return 'ه';
            if (['ى', 'ي'].includes(c)) return 'ي';
            return c;
        }

        function announce(main, sub, time = 3000) {
            const over = document.getElementById('announcement-overlay');
            document.getElementById('main-announcement').innerText = main;
            document.getElementById('sub-announcement').innerText = sub;
            over.classList.add('show');
            if(time > 0) setTimeout(() => over.classList.remove('show'), time);
        }

        // بدء اللعبة
        document.getElementById('start-game').onclick = () => {
            for(let i=1; i<=3; i++) players.push({name: document.getElementById('n'+i).value, score: 0});
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            drawWheel();
            startNewRound();
        };

        function drawWheel() {
            const ctx = document.getElementById('wheelCanvas').getContext('2d');
            const step = (Math.PI*2)/segments.length;
            segments.forEach((s, i) => {
                ctx.beginPath(); ctx.moveTo(200,200); ctx.arc(200,200,190, i*step, (i+1)*step);
                ctx.fillStyle = i%2==0 ? "#2d3436" : "#e94560";
                if(s=="إفلاس") ctx.fillStyle="#000"; if(s=="راحت عليك") ctx.fillStyle="#555";
                ctx.fill(); ctx.strokeStyle="#fff"; ctx.stroke();
                ctx.save(); ctx.translate(200,200); ctx.rotate(i*step + step/2);
                ctx.fillStyle="#fff"; ctx.font="bold 18px Cairo"; ctx.textAlign="right"; ctx.fillText(s, 175, 5); ctx.restore();
            });
        }

        function startNewRound() {
            if (round <= 2) {
                announce(`الجولة ${round}`, round === 1 ? "البداية مع الدوامة!" : "استمروا في تجميع النقاط");
                initRound();
            } else {
                startFinalChallenge();
            }
        }

        function initRound() {
            const q = questions[Math.floor(Math.random()*(questions.length-1))];
            phrase = q.phrase; used = [];
            document.getElementById('cat-display').innerText = "الفئة: " + q.category;
            const disp = document.getElementById('phrase-display'); disp.innerHTML = '';
            phrase.split('').forEach(c => {
                const d = document.createElement('div');
                d.className = c==' ' ? 'letter-box space' : 'letter-box';
                d.textContent = c; disp.appendChild(d);
            });
            updateUI();
        }

        document.getElementById('spin-btn').onclick = () => {
            rotation += 1800 + Math.random()*360;
            const canvas = document.getElementById('wheelCanvas');
            canvas.style.transition = "transform 4s cubic-bezier(0.1, 0, 0.1, 1)";
            canvas.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => {
                const deg = rotation % 360;
                const idx = Math.floor(((360 - deg + 270) % 360) / (360/segments.length));
                wheelValue = segments[idx];
                if(wheelValue=="إفلاس") { announce("إفلاس!", `${players[currentIdx].name} فقد نقاطه`); players[currentIdx].score=0; nextTurn(); }
                else if(wheelValue=="راحت عليك") { announce("راحت عليك!", "الدور للمتسابق التالي"); nextTurn(); }
                else openKB(false);
            }, 4000);
        };

        function openKB(v) {
            document.getElementById('keyboard-overlay').style.display = 'flex';
            const cont = document.getElementById('keys-container'); cont.innerHTML = '';
            const lets = v ? ['أ','و','ي'] : "بتثجحخدذرزسشصضطظعغفقكلمنهـ".split('');
            lets.forEach(l => {
                const btn = document.createElement('button');
                btn.className = `key ${used.includes(normalize(l))?'used':''}`;
                btn.innerText = l;
                if(!used.includes(normalize(l))) btn.onclick = () => handleChoice(l, v);
                cont.appendChild(btn);
            });
        }

        function handleChoice(l, v) {
            const norm = normalize(l); used.push(norm); closeKB();
            let count = 0;
            phrase.split('').forEach((c, i) => { if(normalize(c) === norm) { document.querySelectorAll('.letter-box')[i].classList.add('revealed'); count++; } });
            if(count > 0) {
                if(v) players[currentIdx].score -= 250;
                else players[currentIdx].score += (wheelValue * count);
                if(isPhraseDone()) {
                    round++;
                    announce("تم حل الجملة!", "تنتقل النقاط للجولة التالية");
                    setTimeout(startNewRound, 3100);
                }
            } else {
                if(v) players[currentIdx].score -= 250;
                nextTurn();
            }
            updateUI();
        }

        function isPhraseDone() {
            const revealed = document.querySelectorAll('.letter-box.revealed').length;
            const total = phrase.replace(/\s/g, '').length;
            return revealed === total;
        }

        function nextTurn() { currentIdx = (currentIdx + 1) % players.length; updateUI(); }
        function closeKB() { document.getElementById('keyboard-overlay').style.display = 'none'; }
        function updateUI() {
            const row = document.getElementById('players-row'); row.innerHTML = '';
            players.forEach((p, i) => {
                row.innerHTML += `<div class="p-tag ${i==currentIdx?'active':''}"><b>${p.name}</b><br>${p.score}</div>`;
            });
            document.getElementById('vowel-btn').disabled = players[currentIdx].score < 250;
        }

        // الجولة النهائية (تحدي الفانوس)
        function startFinalChallenge() {
            // البحث عن المتصدر
            let winner = players[0];
            players.forEach(p => { if(p.score > winner.score) winner = p; });
            currentIdx = players.indexOf(winner);
            updateUI();

            announce("تحدي الفانوس!", `المتأهل هو ${winner.name}.. استعد!`, 0);
            document.getElementById('final-start-btn').classList.remove('hidden');
        }

        document.getElementById('final-start-btn').onclick = () => {
            document.getElementById('announcement-overlay').classList.remove('show');
            document.getElementById('round-title').innerText = "تحدي الفانوس الأخير";
            document.getElementById('final-timer').style.display = 'block';
            document.getElementById('wheel-area').style.display = 'none';
            document.getElementById('vowel-btn').style.display = 'none';
            document.getElementById('spin-btn').style.display = 'none';
            
            // سؤال التحدي الأخير
            const q = questions[questions.length-1];
            phrase = q.phrase; used = [];
            document.getElementById('cat-display').innerText = "الفئة: " + q.category;
            const disp = document.getElementById('phrase-display'); disp.innerHTML = '';
            phrase.split('').forEach(c => {
                const d = document.createElement('div');
                d.className = c==' ' ? 'letter-box space' : 'letter-box';
                d.textContent = c; disp.appendChild(d);
            });

            // كشف الحروف التلقائية (ي ن ل س ك ص)
            const autoLetters = ['ي','ن','ل','س','ك','ص'];
            phrase.split('').forEach((c, i) => {
                if(autoLetters.includes(normalize(c))) document.querySelectorAll('.letter-box')[i].classList.add('revealed');
            });

            // مؤقت 30 ثانية
            let time = 30;
            const timer = setInterval(() => {
                time--;
                document.getElementById('final-timer').innerText = time;
                if(time <= 0) {
                    clearInterval(timer);
                    announce("انتهى الوقت!", "حظ أوفر في المرات القادمة", 5000);
                    setTimeout(() => location.reload(), 5100);
                }
            }, 1000);

            window.finalTimer = timer;
        };

        document.getElementById('solve-btn').onclick = () => {
            const solve = prompt("اكتب الحل كاملاً:");
            if(!solve) return;
            const normS = solve.split('').map(normalize).join('');
            const normP = phrase.split('').map(normalize).join('');
            if(normS === normP) {
                clearInterval(window.finalTimer);
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
                announce("مبروك الفانوس! 🏆", `${players[currentIdx].name} هو بطل المسابقة!`, 0, true);
            } else {
                announce("إجابة خاطئة!", "حاول التركيز أكثر في الجملة");
            }
        };

        document.getElementById('vowel-btn').onclick = () => openKB(true);
    </script>
</body>
</html>
