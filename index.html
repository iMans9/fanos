<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فانوس - نسخة منصور الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --red: #e94560; --navy: #1a1a2e; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: #0a0a12; color: white; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .screen.active { display: flex; }

        /* شاشة الإعداد */
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; font-family: inherit; font-weight: bold; }
        .main-btn { background: var(--gold); color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-weight: 900; cursor: pointer; font-size: 1.2rem; transition: 0.3s; width: 100%; }

        /* لوحة اللعبة */
        .top-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .badge { background: var(--glass); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--gold); font-size: 0.9rem; }
        
        #phrase-display { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin: 20px 0; min-height: 100px; }
        .letter-box { width: 35px; height: 45px; background: #fff; color: transparent; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; transition: 0.5s; }
        .letter-box.revealed { color: #000; transform: rotateY(360deg); }
        .letter-box.space { background: transparent; width: 15px; }

        /* العجلة */
        .wheel-container { position: relative; width: 300px; height: 300px; margin: 10px auto; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 30px; color: var(--red); z-index: 10; text-shadow: 0 2px 5px #000; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* اللاعبين والتحكم */
        #players-sidebar { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; width: 100%; }
        .p-tag { background: var(--glass); padding: 10px; border-radius: 10px; font-size: 0.8rem; border-bottom: 3px solid transparent; min-width: 80px; }
        .p-tag.active { border-bottom-color: var(--gold); background: rgba(255,215,0,0.1); }

        .controls { display: flex; gap: 10px; margin-top: 10px; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-spin { background: var(--red); color: white; }
        .btn-vowel { background: #00cec9; color: white; }

        /* الكيبورد */
        #keyboard-box { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); padding: 15px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; z-index: 100; border-radius: 20px 20px 0 0; }
        .key { padding: 10px; min-width: 35px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; background: #fff; color: #000; }
        .key.used { opacity: 0.2; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen active">
        <div class="glass-card">
            <h1 style="color:var(--gold)">فـانـوس</h1>
            <select id="p-count">
                <option value="2">لاعبين (2)</option>
                <option value="3" selected>ثلاثة لاعبين (3)</option>
                <option value="4">أربعة لاعبين (4)</option>
            </select>
            <div id="p-names"></div>
            <input type="number" id="t-score" value="3000" placeholder="هدف الفوز">
            <button id="start-btn" class="main-btn">دخول اللعبة</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="top-nav">
            <div class="badge">الفئة: <span id="cat-name">---</span></div>
            <div class="badge">الهدف: <span id="goal-val">0</span></div>
        </div>
        <div id="phrase-display"></div>
        <div id="players-sidebar"></div>
        <div class="wheel-container">
            <div class="pointer">▼</div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>
        <div class="controls">
            <button id="spin-btn" class="btn btn-spin">لف العجلة</button>
            <button id="vowel-btn" class="btn btn-vowel" disabled>مساعدة (250)</button>
        </div>
        <div id="keyboard-box" class="hidden">
            <div id="keys"></div>
        </div>
    </div>

    <audio id="s-spin" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
    <audio id="s-correct" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
    <audio id="s-wrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
    <audio id="s-win" src="https://www.soundjay.com/misc/sounds/success-fanfare-trumpets-10.mp3"></audio>

    <script>
        const questions = [
            {"category": "كرة قدم", "phrase": "ريال مدريد نادي القرن"},
            {"category": "أمثال شعبية", "phrase": "الوقت كالسيف"},
            {"category": "تقنية", "phrase": "الذكاء الاصطناعي"},
            {"category": "معلومات", "phrase": "المملكة العربية السعودية"}
        ];

        let players = [], currentIdx = 0, target = 3000, phrase = "", used = [], rotation = 0, wheelValue = 0;
        const segments = [100, 200, 500, "إفلاس", 1000, 1500, "راحت عليك", 300, 700, 250];

        // إعداد الأسماء
        const pCount = document.getElementById('p-count');
        const pNames = document.getElementById('p-names');
        function updateInputs() {
            pNames.innerHTML = '';
            for(let i=1; i<=pCount.value; i++) pNames.innerHTML += `<input type="text" id="n${i}" value="لاعب ${i}">`;
        }
        pCount.onchange = updateInputs; updateInputs();

        // بدء اللعبة
        document.getElementById('start-btn').onclick = () => {
            target = document.getElementById('t-score').value;
            for(let i=1; i<=pCount.value; i++) players.push({name: document.getElementById('n'+i).value, score:0});
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('goal-val').innerText = target;
            drawWheel(); initRound();
        };

        function drawWheel() {
            const ctx = document.getElementById('wheelCanvas').getContext('2d');
            const step = (Math.PI*2)/segments.length;
            segments.forEach((s, i) => {
                ctx.beginPath(); ctx.moveTo(200,200); ctx.arc(200,200,190, i*step, (i+1)*step);
                ctx.fillStyle = i%2==0 ? "#2d3436" : "#e94560";
                if(s=="إفلاس") ctx.fillStyle="#000"; if(s=="راحت عليك") ctx.fillStyle="#555";
                ctx.fill(); ctx.strokeStyle="#fff"; ctx.stroke();
                ctx.save(); ctx.translate(200,200); ctx.rotate(i*step + step/2);
                ctx.fillStyle="#fff"; ctx.font="bold 20px Cairo"; ctx.textAlign="right"; ctx.fillText(s, 170, 8); ctx.restore();
            });
        }

        document.getElementById('spin-btn').onclick = () => {
            document.getElementById('s-spin').play().catch(()=>{});
            const spin = 1800 + Math.random()*360;
            rotation += spin;
            const canvas = document.getElementById('wheelCanvas');
            canvas.style.transition = "transform 4s cubic-bezier(0.15, 0, 0.15, 1)";
            canvas.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                const deg = rotation % 360;
                // الحسبة الذهبية: السهم في الأعلى (درجة 270)
                const idx = Math.floor(((360 - deg + 270) % 360) / (360/segments.length));
                wheelValue = segments[idx];
                
                if(wheelValue=="إفلاس") { alert("إفلاس!"); players[currentIdx].score=0; nextTurn(); }
                else if(wheelValue=="راحت عليك") { alert("راحت عليك!"); nextTurn(); }
                else { showKB(false); }
            }, 4000);
        };

        function initRound() {
            const q = questions[Math.floor(Math.random()*questions.length)];
            phrase = q.phrase; used = [];
            document.getElementById('cat-name').innerText = q.category;
            const disp = document.getElementById('phrase-display'); disp.innerHTML = '';
            phrase.split('').forEach(c => {
                const d = document.createElement('div');
                d.className = c==' ' ? 'letter-box space' : 'letter-box';
                d.textContent = c; disp.appendChild(d);
            });
            updateUI();
        }

        function showKB(v) {
            document.getElementById('keyboard-box').classList.remove('hidden');
            const k = document.getElementById('keys'); k.innerHTML = '';
            const lets = v ? ['أ','و','ي'] : "بتثجحخدذرزسشصضطظعغفقكلمنهـ".split('');
            lets.forEach(l => {
                const b = document.createElement('button'); b.className = `key ${used.includes(l)?'used':''}`;
                b.innerText = l; if(!used.includes(l)) b.onclick = () => handle(l, v);
                k.appendChild(b);
            });
        }

        function handle(l, v) {
            used.push(l); document.getElementById('keyboard-box').classList.add('hidden');
            let count = 0;
            phrase.split('').forEach((c, i) => {
                if(c == l) { document.querySelectorAll('.letter-box')[i].classList.add('revealed'); count++; }
            });

            if(count > 0) {
                document.getElementById('s-correct').play().catch(()=>{});
                if(v) players[currentIdx].score -= 250;
                else players[currentIdx].score += (wheelValue * count);
                if(isWin()) { document.getElementById('s-win').play(); alert("مبروك! فاز " + players[currentIdx].name); location.reload(); }
            } else {
                document.getElementById('s-wrong').play().catch(()=>{}); nextTurn();
            }
            updateUI();
        }

        function nextTurn() { currentIdx = (currentIdx + 1) % players.length; updateUI(); }
        function updateUI() {
            const side = document.getElementById('players-sidebar'); side.innerHTML = '';
            players.forEach((p, i) => {
                side.innerHTML += `<div class="p-tag ${i==currentIdx?'active':''}"><b>${p.name}</b><br>${p.score}</div>`;
            });
            document.getElementById('vowel-btn').disabled = players[currentIdx].score < 250;
        }
        function isWin() { return players[currentIdx].score >= target; }
        document.getElementById('vowel-btn').onclick = () => showKB(true);
    </script>
</body>
</html>
