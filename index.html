<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سباق الحروف مع منصور - نسخة منصور المحدثة بالأصوات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #ffd700; --red: #e94560; --navy: #0a0a14; --glass: rgba(255, 255, 255, 0.05); --green: #2ecc71; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--navy); color: white; height: 100vh; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .screen.active { display: flex; }
        #announcement-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 3000; opacity: 0; pointer-events: none; transition: 0.5s; }
        #announcement-overlay.show { opacity: 1; pointer-events: auto; }
        .big-text { font-size: 3.5rem; font-weight: 900; color: var(--gold); text-align: center; }
        #game-layout { display: grid; grid-template-columns: 1fr 400px; grid-template-rows: 100px 1fr 140px; height: 100vh; width: 100vw; gap: 15px; padding: 15px; }
        .header-area { grid-column: 1 / 3; display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 0 30px; border-radius: 20px; }
        .board-area { grid-column: 1; background: var(--glass); border-radius: 25px; display: flex; flex-direction: column; justify-content: center; padding: 20px; }
        .wheel-area { grid-column: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 25px; }
        .controls-area { grid-column: 1 / 3; background: var(--glass); border-radius: 25px; display: flex; justify-content: center; align-items: center; gap: 15px; }
        #phrase-display { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .letter-box { width: 45px; height: 60px; background: #fff; color: transparent; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900; transition: 0.6s; box-shadow: 0 4px 0 #ccc; }
        .letter-box.revealed { color: #000; transform: rotateY(360deg); }
        .letter-box.space { background: transparent; width: 20px; box-shadow: none; }
        .wheel-container { position: relative; width: 320px; height: 320px; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #fff; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 35px; color: var(--red); z-index: 10; }
        .btn { padding: 12px 30px; border-radius: 50px; border: none; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn-spin { background: var(--red); color: white; }
        .btn-solve { background: var(--green); color: white; }
        #keyboard-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; }
        #keyboard-content { background: #1a1a2e; padding: 25px; border-radius: 25px; border: 2px solid var(--gold); text-align: center; }
        .key-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 15px; }
        .key { width: 45px; height: 45px; border-radius: 8px; border: none; background: #fff; font-weight: 900; font-size: 1.3rem; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="announcement-overlay">
        <div class="announcement-card">
            <h1 id="main-announcement" class="big-text">سباق الحروف مع منصور</h1>
            <p id="sub-announcement" style="font-size: 1.6rem; margin-top: 10px; text-align: center;"></p>
            <button id="close-announcer" class="btn btn-spin hidden" style="margin-top:20px;">العودة للرئيسية</button>
        </div>
    </div>

    <div id="setup-screen" class="screen active">
        <div style="background: var(--glass); padding: 40px; border-radius: 30px; border: 1px solid var(--gold); text-align: center;">
            <h1 style="font-size: 3.5rem; color: var(--gold);">سـباق الحـروف</h1>
            <input type="text" id="n1" value="متسابق 1" style="display:block; width:300px; padding:10px; margin:10px auto; border-radius:10px; border:none;">
            <input type="text" id="n2" value="متسابق 2" style="display:block; width:300px; padding:10px; margin:10px auto; border-radius:10px; border:none;">
            <input type="text" id="n3" value="متسابق 3" style="display:block; width:300px; padding:10px; margin:10px auto; border-radius:10px; border:none;">
            <button id="start-game" class="btn btn-spin" style="margin-top:20px;">ابدأ السباق</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-layout">
            <div class="header-area">
                <div id="round-label" style="font-size: 1.6rem; font-weight: 900; color: var(--gold);">الجولة الأولى: جولة الدوامة</div>
                <div id="players-row" style="display:flex; gap:10px;"></div>
            </div>
            <div class="board-area"><div id="phrase-display"></div></div>
            <div class="wheel-area">
                <div class="wheel-container"><div class="pointer">▼</div><canvas id="wheelCanvas" width="400" height="400"></canvas></div>
            </div>
            <div class="controls-area">
                <button id="spin-btn" class="btn btn-spin">لف الدوامة</button>
                <button id="vowel-btn" class="btn" style="background:#00cec9; color:#fff" disabled>حرف مساعد (250)</button>
                <button id="solve-btn" class="btn btn-solve">حل اللغز</button>
            </div>
        </div>
    </div>

    <div id="keyboard-overlay">
        <div id="keyboard-content">
            <div class="key-grid" id="keys-container"></div>
            <button onclick="closeKB()" style="margin-top:20px; background:none; border:1px solid #fff; color:#fff; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <audio id="snd-spin" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" preload="auto"></audio>
    <audio id="snd-correct" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>
    <audio id="snd-wrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3" preload="auto"></audio>
    <audio id="snd-round-win" src="https://www.soundjay.com/misc/sounds/success-fanfare-trumpets-10.mp3" preload="auto"></audio>
    <audio id="snd-total-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>

    <script>
        const questions = [
            {"category": "كرة قدم", "phrase": "ريال مدريد نادي القرن"},
            {"category": "أمثال شعبية", "phrase": "الوقت كالسيف"},
            {"category": "تقنية", "phrase": "الذكاء الاصطناعي"},
            {"category": "معلومات", "phrase": "المملكة العربية السعودية"}
        ];

        let players = [], currentIdx = 0, phrase = "", used = [], rotation = 0, wheelValue = 0, round = 1;
        const segments = [100, 200, 500, "إفلاس", 1000, 1500, "راحت عليك", 300, 700, 250];

        function playSound(id) {
            const s = document.getElementById(id);
            s.currentTime = 0;
            s.play().catch(e => console.log("تفاعل مع الصفحة أولاً لتشغيل الصوت"));
        }

        function normalize(c) {
            if (['أ', 'إ', 'آ', 'ا'].includes(c)) return 'ا';
            if (['ة', 'ه'].includes(c)) return 'ه';
            if (['ى', 'ي'].includes(c)) return 'ي';
            return c;
        }

        function announce(main, sub, time = 3000, isFinal = false) {
            const over = document.getElementById('announcement-overlay');
            document.getElementById('main-announcement').innerText = main;
            document.getElementById('sub-announcement').innerText = sub;
            over.classList.add('show');
            if(isFinal) {
                document.getElementById('close-announcer').classList.remove('hidden');
                document.getElementById('close-announcer').onclick = () => location.reload();
            } else if(time > 0) {
                setTimeout(() => over.classList.remove('show'), time);
            }
        }

        document.getElementById('start-game').onclick = () => {
            for(let i=1; i<=3; i++) players.push({name: document.getElementById('n'+i).value, score: 0});
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            drawWheel();
            startSequence();
        };

        function drawWheel() {
            const ctx = document.getElementById('wheelCanvas').getContext('2d');
            const step = (Math.PI*2)/segments.length;
            segments.forEach((s, i) => {
                ctx.beginPath(); ctx.moveTo(200,200); ctx.arc(200,200,190, i*step, (i+1)*step);
                ctx.fillStyle = i%2==0 ? "#2d3436" : "#e94560";
                if(s=="إفلاس") ctx.fillStyle="#000"; if(s=="راحت عليك") ctx.fillStyle="#555";
                ctx.fill(); ctx.strokeStyle="#fff"; ctx.stroke();
                ctx.save(); ctx.translate(200,200); ctx.rotate(i*step + step/2);
                ctx.fillStyle="#fff"; ctx.font="bold 18px Cairo"; ctx.textAlign="right"; ctx.fillText(s, 175, 5); ctx.restore();
            });
        }

        function startSequence() {
            if (round <= 2) {
                announce(`الجولة ${round === 1 ? 'الأولى' : 'الثانية'}`, round === 1 ? "جولة الدوامة.. بالتوفيق!" : "الجولة الأخيرة.. الحسم!");
                initRound();
            } else {
                declareWinner();
            }
        }

        function initRound() {
            const q = questions[Math.floor(Math.random()*questions.length)];
            phrase = q.phrase; used = [];
            const disp = document.getElementById('phrase-display'); disp.innerHTML = '';
            phrase.split('').forEach(c => {
                const d = document.createElement('div');
                d.className = c==' ' ? 'letter-box space' : 'letter-box';
                d.textContent = c; disp.appendChild(d);
            });
            updateUI();
        }

        document.getElementById('spin-btn').onclick = () => {
            playSound('snd-spin');
            rotation += 1800 + Math.random()*360;
            document.getElementById('wheelCanvas').style.transform = `rotate(${rotation}deg)`;
            document.getElementById('wheelCanvas').style.transition = "transform 4s cubic-bezier(0.1, 0, 0.1, 1)";
            setTimeout(() => {
                const deg = rotation % 360;
                const idx = Math.floor(((360 - deg + 270) % 360) / (360/segments.length));
                wheelValue = segments[idx];
                if(wheelValue=="إفلاس") { players[currentIdx].score=0; playSound('snd-wrong'); nextTurn(); }
                else if(wheelValue=="راحت عليك") { playSound('snd-wrong'); nextTurn(); }
                else openKB(false);
            }, 4000);
        };

        function openKB(v) {
            document.getElementById('keyboard-overlay').style.display = 'flex';
            const cont = document.getElementById('keys-container'); cont.innerHTML = '';
            const lets = v ? ['أ','و','ي'] : "بتثجحخدذرزسشصضطظعغفقكلمنهـ".split('');
            lets.forEach(l => {
                const btn = document.createElement('button');
                btn.className = `key`;
                btn.innerText = l;
                btn.onclick = () => handleChoice(l, v);
                cont.appendChild(btn);
            });
        }

        function handleChoice(l, v) {
            const norm = normalize(l); used.push(norm); closeKB();
            let count = 0;
            phrase.split('').forEach((c, i) => { if(normalize(c) === norm) { document.querySelectorAll('.letter-box')[i].classList.add('revealed'); count++; } });
            if(count > 0) {
                playSound('snd-correct');
                if(v) players[currentIdx].score -= 250;
                else players[currentIdx].score += (wheelValue * count);
                if(isSolved()) finishRound();
            } else {
                playSound('snd-wrong');
                nextTurn();
            }
            updateUI();
        }

        function finishRound() {
            playSound('snd-round-win');
            round++;
            if (round <= 2) {
                announce("أحسنت!", "ننتقل للجولة التالية..", 3000);
                setTimeout(startSequence, 3100);
            } else {
                startSequence();
            }
        }

        function declareWinner() {
            playSound('snd-total-win');
            let winner = players[0];
            players.forEach(p => { if(p.score > winner.score) winner = p; });
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
            announce("بطل سباق الحروف مع منصور! 🏆", `الفائز هو ${winner.name} بـ ${winner.score} نقطة`, 0, true);
        }

        function isSolved() {
            const revealed = document.querySelectorAll('.letter-box.revealed').length;
            const total = phrase.replace(/\s/g, '').length;
            return revealed === total;
        }

        document.getElementById('solve-btn').onclick = () => {
            const attempt = prompt("اكتب الحل:");
            if(!attempt) return;
            if(attempt.split('').map(normalize).join('') === phrase.split('').map(normalize).join('')) {
                players[currentIdx].score += 500;
                finishRound();
            } else {
                playSound('snd-wrong');
                nextTurn();
            }
        };

        function nextTurn() { currentIdx = (currentIdx + 1) % players.length; updateUI(); }
        function closeKB() { document.getElementById('keyboard-overlay').style.display = 'none'; }
        function updateUI() {
            const row = document.getElementById('players-row'); row.innerHTML = '';
            players.forEach((p, i) => {
                row.innerHTML += `<div class="p-tag ${i==currentIdx?'active':''}"><b>${p.name}</b><br>${p.score}</div>`;
            });
            document.getElementById('vowel-btn').disabled = players[currentIdx].score < 250;
        }
        document.getElementById('vowel-btn').onclick = () => openKB(true);
    </script>
</body>
</html>
