<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الفانوس - نسخة منصور الاحترافية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <header id="board">
            <div id="category-tag">الفئة: <span id="category-name">---</span></div>
            <div id="phrase-display"></div>
            <div id="status-msg">انتظر تحميل اللعبة...</div>
        </header>

        <main id="game-body">
            <aside class="players-list">
                <div class="player-card active" id="p0">
                    <span class="p-name">لاعب 1</span>
                    <span class="p-score">0</span>
                </div>
                <div class="player-card" id="p1">
                    <span class="p-name">لاعب 2</span>
                    <span class="p-score">0</span>
                </div>
                <div class="player-card" id="p2">
                    <span class="p-name">لاعب 3</span>
                    <span class="p-score">0</span>
                </div>
            </aside>

            <section class="wheel-section">
                <div class="wheel-pointer">▼</div>
                <canvas id="wheelCanvas" width="350" height="350"></canvas>
                <div class="main-controls">
                    <button id="spin-btn">لف العجلة</button>
                    <button id="buy-vowel-btn" disabled>شراء حرف (250)</button>
                    <button id="solve-btn">أعرف الحل!</button>
                </div>
            </section>
        </main>

        <footer id="interaction-area" class="hidden">
            <div id="keyboard"></div>
            <div id="solve-input-group" class="hidden">
                <input type="text" id="solve-input" placeholder="اكتب الحل كاملاً هنا...">
                <button id="confirm-solve">تأكيد</button>
            </div>
        </footer>
    </div>
    <script src="game.js"></script>
</body>
</html>
